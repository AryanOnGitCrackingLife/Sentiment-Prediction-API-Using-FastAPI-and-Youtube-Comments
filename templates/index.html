<!DOCTYPE html>
<html>
<head>
    <title>YouTube Sentiment Analyzer</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h1>🎬 YouTube Comment Sentiment Analyzer</h1>

    <form method="post" action="/analyze">
        <input type="text" name="video_id" placeholder="Enter YouTube Video ID" required>
        <button type="submit">Analyze Sentiment</button>
    </form>

    {% if results %}
        <h2>Results for Video ID: {{ video_id }}</h2>
        <div class="results">
            {% for r in results %}
                <div class="card">
                    <p><strong>Comment:</strong> {{ r.comment }}</p>
                    <p><strong>Sentiment:</strong> {{ r.sentiment }}</p>
                </div>
            {% endfor %}
        </div>
    {% endif %}
</div>

</body>
</html>
